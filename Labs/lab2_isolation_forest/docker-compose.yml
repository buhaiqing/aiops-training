version: '3.8'

services:
  # MLflow Tracking Server
  mlflow:
    image: python:3.10-slim
    container_name: mlflow-tracking-server
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_TRACKING_URI=http://0.0.0.0:5000
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - MLFLOW_HTTP_REQUEST_TIMEOUT=60
    volumes:
      - ./mlruns:/app/mlruns
      - ./models:/app/models
    command: >
      bash -c "pip install mlflow==2.10.0 psycopg2-binary==2.9.9 &&
               mlflow server 
               --host 0.0.0.0 
               --port 5000 
               --backend-store-uri postgresql://mlflow:mlflow_password@postgres:5432/mlflow_db 
               --default-artifact-root /app/mlruns 
               --serve-artifacts"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mlflow-network
    restart: unless-stopped

  # PostgreSQL Database for MLflow Backend Store
  postgres:
    image: postgres:14-alpine
    container_name: mlflow-postgres
    environment:
      POSTGRES_DB: mlflow_db
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlflow-network
    restart: unless-stopped

  # MinIO for Artifact Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: mlflow-minio
    ports:
      - "9000:9000"   # API port
      - "9001:9001"   # Console port
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - mlflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

networks:
  mlflow-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
